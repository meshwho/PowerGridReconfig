name: Apply physical edge activity mask

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'chore: stage physical edge mask update'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply targeted patch
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import codecs
          import re
          from pathlib import Path


          def read_text(path: str) -> tuple[str, bool]:
              raw = Path(path).read_bytes()
              has_bom = raw.startswith(codecs.BOM_UTF8)
              return raw.decode("utf-8-sig"), has_bom


          def write_text(path: str, text: str, has_bom: bool = False) -> None:
              raw = text.encode("utf-8")
              if has_bom:
                  raw = codecs.BOM_UTF8 + raw
              Path(path).write_bytes(raw)


          def replace_once(path: str, old: str, new: str) -> None:
              text, has_bom = read_text(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one exact match, found {count}")
              write_text(path, text.replace(old, new, 1), has_bom)


          def replace_count(path: str, old: str, new: str, expected: int) -> None:
              text, has_bom = read_text(path)
              count = text.count(old)
              if count != expected:
                  raise RuntimeError(
                      f"{path}: expected {expected} exact matches, found {count}"
                  )
              write_text(path, text.replace(old, new), has_bom)


          def sub_once(path: str, pattern: str, replacement: str) -> None:
              text, has_bom = read_text(path)
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{path}: regex did not match exactly once")
              write_text(path, updated, has_bom)


          model_path = "grid_topology_ai/models/graph_policy_value_net_v2.py"

          aggregate_method = '''    @staticmethod
          def _aggregate_messages(
              messages: torch.Tensor,
              target_indices: torch.Tensor,
              num_nodes: int,
              edge_active_mask: torch.Tensor,
          ) -> torch.Tensor:
              """
              Batched aggregation of active edge messages into node embeddings.

              messages:
                  [batch_size, num_edges, hidden_dim]

              target_indices:
                  [batch_size, num_edges]

              edge_active_mask:
                  [batch_size, num_edges]

              returns:
                  [batch_size, num_nodes, hidden_dim]
              """

              batch_size, num_edges, hidden_dim = messages.shape

              if edge_active_mask.shape != (batch_size, num_edges):
                  raise ValueError(
                      "edge_active_mask must have shape "
                      f"({batch_size}, {num_edges}), got "
                      f"{tuple(edge_active_mask.shape)}"
                  )

              index = target_indices.long().unsqueeze(-1).expand(
                  batch_size,
                  num_edges,
                  hidden_dim,
              )

              active = edge_active_mask.to(dtype=messages.dtype).unsqueeze(-1)
              masked_messages = messages * active

              aggregated = messages.new_zeros(
                  batch_size,
                  num_nodes,
                  hidden_dim,
              )

              aggregated.scatter_add_(
                  dim=1,
                  index=index,
                  src=masked_messages,
              )

              count_index = target_indices.long().unsqueeze(-1)

              counts = messages.new_zeros(
                  batch_size,
                  num_nodes,
                  1,
              )

              counts.scatter_add_(
                  dim=1,
                  index=count_index,
                  src=active,
              )

              return aggregated / counts.clamp_min(1.0)

          def _directional_messages('''
