name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/py311.txt
            requirements.txt

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1

      - name: Install test dependencies
        run: python -m pip install -c constraints/py311.txt -e ".[test]"

      - name: Check installed packages
        run: python -m pip check

      - name: Print dependency diagnostics
        run: >-
          python -c "import importlib.metadata as m, platform;
          print('python', platform.python_version());
          [print(package, m.version(package)) for package in
          ('numpy', 'scipy', 'pandas', 'torch', 'pypower')];
          assert m.version('numpy') == '1.26.4';
          assert m.version('pypower') == '5.1.19'"

      - name: Compile Python sources
        run: python -m compileall -q grid_topology_ai scripts tests

      - name: Run tests
        run: python -m pytest -q

      - name: Self-play CLI help
        if: runner.os == 'Linux'
        run: python -m scripts.self_play.loop --help

      - name: Self-play plan only
        if: runner.os == 'Linux'
        run: python -m scripts.self_play.loop configs/self_play_loop_pilot.yaml --plan-only

  package-build:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Build package
        run: python -m build

      - name: Check distributions exist
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"

      - name: Import wheel in clean venv without dependencies
        run: |
          python -m venv /tmp/pgr-wheel-venv
          /tmp/pgr-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/pgr-wheel-venv/bin/python -m pip install --no-deps dist/*.whl
          /tmp/pgr-wheel-venv/bin/python -c "import grid_topology_ai"

  data-tools-smoke:
    name: Data tools smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/py311.txt
            requirements.txt

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1

      - name: Install data dependencies
        run: python -m pip install -c constraints/py311.txt -e ".[data,test]"

      - name: Check installed packages
        run: python -m pip check

      - name: Import data tools
        run: >-
          python -c "import importlib.metadata as m;
          import numpy, numba, pandapower, pandapower.networks, pyarrow, pypower;
          assert m.version('pandapower') == '2.14.11';
          assert m.version('numpy') == '1.26.4';
          assert m.version('pypower') == '5.1.19';
          print('pandapower', pandapower.__version__);
          print('numpy', numpy.__version__);
          print('numba', numba.__version__);
          print('pyarrow', pyarrow.__version__);
          print('pypower', m.version('pypower'))"

      - name: Data generation CLI help
        run: python -m scripts.data.generate_case118_raw --help
